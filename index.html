<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>The Infinity Core</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <canvas id="quasarCanvas"></canvas>

  <video id="cameraFeed" playsinline muted autoplay></video>

  <button id="uiToggle" class="ui-toggle" aria-label="Toggle observatory interface">
    Observatory
  </button>

  <div id="interfaceShell" class="hud">
    <section class="observatory-card primary-readout">
      <span class="readout-kicker">Object</span>
      <h1>The Infinity Core</h1>
      <p id="statusText">Dormant. Suspended in the void.</p>

      <div class="readout-grid">
        <div>
          <span>State</span>
          <strong id="artifactStateText">Dormant</strong>
        </div>

        <div>
          <span>Gesture</span>
          <strong id="gestureText">Touch / Mouse</strong>
        </div>

        <div>
          <span>Influence</span>
          <strong id="energyText">100%</strong>
        </div>
      </div>
    </section>

    <section class="observatory-card control-readout">
      <div class="section-label">Influence</div>

      <div class="controls">
        <button data-mode="pull" class="active">Collapse</button>
        <button data-mode="push">Expand</button>
        <button data-mode="spin">Rotate</button>
        <button data-mode="storm">Disturb</button>
        <button data-mode="calm">Stillness</button>
      </div>

      <div class="utility-row">
  <button id="sceneBtn">Shift State</button>
  <button id="cameraBtn">Start Camera</button>
  <button id="resetBtn">Reform</button>
  <button id="pauseBtn">Suspend</button>
</div>

      <div class="camera-status">
        <span id="handStatus">Hand tracking off</span>
      </div>

      <div class="energy-wrap">
        <div class="energy-track">
          <div id="energyFill"></div>
        </div>
      </div>
    </section>
  </div>

  <div class="hint">
    H hide · R reform · Space pulse · Pinch collapse · Open hand expand
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script type="module" src="./bootstrap.js"></script>
</body>
</html>
