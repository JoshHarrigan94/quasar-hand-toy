<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quasar Hand Toy</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="quasarCanvas"></canvas>

  <video id="cameraFeed" playsinline muted autoplay></video>

  <div class="hud">
    <div class="brand">
      <h1>Quasar Toy</h1>
      <p id="statusText">Bend the galaxy.</p>

      <div class="gesture-card">
        <span class="gesture-label">Gesture</span>
        <strong id="gestureText">Touch / Mouse</strong>
      </div>
    </div>

    <div class="panel">
      <div class="section-label">Powers</div>
      <div class="controls">
        <button data-mode="pull" class="active">Pull</button>
        <button data-mode="push">Push</button>
        <button data-mode="spin">Spin</button>
        <button data-mode="storm">Storm</button>
        <button data-mode="calm">Calm</button>
      </div>

      <div class="section-label">Themes</div>
      <div class="controls">
        <button data-theme="quasar" class="active">Quasar</button>
        <button data-theme="ember">Ember</button>
        <button data-theme="ocean">Ocean</button>
        <button data-theme="aurora">Aurora</button>
      </div>

      <div class="utility-row">
        <button id="cameraBtn">Start Camera</button>
        <button id="resetBtn">Reset</button>
        <button id="pauseBtn">Pause</button>
      </div>

      <div class="camera-status">
        <span id="handStatus">Hand tracking off</span>
      </div>

      <div class="gesture-help">
        <div>
          <strong>Open hand</strong>
          <span>guide field</span>
        </div>
        <div>
          <strong>Pinch</strong>
          <span>grab / pull</span>
        </div>
        <div>
          <strong>Fast swipe</strong>
          <span>fling particles</span>
        </div>
        <div>
          <strong>Hold still</strong>
          <span>stabilise</span>
        </div>
      </div>

      <div class="energy-wrap">
        <div class="energy-label">
          <span>Energy</span>
          <span id="energyText">100%</span>
        </div>
        <div class="energy-track">
          <div id="energyFill"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="hint">
    Camera uses your index finger as the cursor · Pinch to grab · Space Explode · I Implode · R Reset
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
