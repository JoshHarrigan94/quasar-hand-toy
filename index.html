<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>The Infinity Core</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <canvas id="quasarCanvas"></canvas>

  <video id="cameraFeed" playsinline muted autoplay></video>

  <button id="uiToggle" class="ui-toggle" aria-label="Toggle interface">
    Observatory
  </button>

  <div id="interfaceShell" class="hud">
    <div class="brand">
      <h1>The Infinity Core</h1>
      <p id="statusText">An impossible object suspended in the void.</p>

      <div class="gesture-card">
        <span class="gesture-label">Gesture</span>
        <strong id="gestureText">Touch / Mouse</strong>
      </div>
    </div>

    <div class="panel">
      <div class="section-label">Influence</div>

      <div class="controls">
        <button data-mode="pull" class="active">Collapse</button>
        <button data-mode="push">Expand</button>
        <button data-mode="spin">Rotate</button>
        <button data-mode="storm">Disturb</button>
        <button data-mode="calm">Stillness</button>
      </div>

      <div class="utility-row">
        <button id="cameraBtn">Start Camera</button>
        <button id="resetBtn">Reset</button>
        <button id="pauseBtn">Pause</button>
      </div>

      <div class="camera-status">
        <span id="handStatus">Hand tracking off</span>
      </div>

      <div class="gesture-help">
        <div>
          <strong>Open hand</strong>
          <span>expand field</span>
        </div>

        <div>
          <strong>Pinch</strong>
          <span>collapse matter</span>
        </div>

        <div>
          <strong>Fast swipe</strong>
          <span>gravity wave</span>
        </div>

        <div>
          <strong>Hold still</strong>
          <span>quiet the core</span>
        </div>
      </div>

      <div class="energy-wrap">
        <div class="energy-label">
          <span>Influence</span>
          <span id="energyText">100%</span>
        </div>

        <div class="energy-track">
          <div id="energyFill"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="hint">
    Collapse · Expand · Rotate · Disturb · Stillness
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
