<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quasar Hand Toy</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="quasarCanvas"></canvas>

  <div class="hud">
    <div>
      <h1>Quasar Toy</h1>
      <p>Move, hold, tap, and double tap.</p>
    </div>

    <div class="controls">
      <button data-mode="pull" class="active">Pull</button>
      <button data-mode="push">Push</button>
      <button data-mode="spin">Spin</button>
      <button data-mode="calm">Calm</button>
    </div>
  </div>

  <div class="hint">
    Keys: 1 Pull · 2 Push · 3 Spin · 4 Calm · Double click/tap = Explode
  </div>

  <script src="app.js"></script>
</body>
</html>
